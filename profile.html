<!DOCTYPE html>

<html lang="en">

<head>


<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>
    Player Profile
</title>

<link rel="stylesheet"
      href="css/style.css">


</head>

<body>


<header class="top-bar">

    <div class="logo">

        👤 PLAYER PROFILE

    </div>

</header>

<main class="profile-container">

    <div class="profile-card">

        <h1>
            Blackjack Academy Career
        </h1>

        <p>
            🪙 Purush Coins:
            <span id="profile-coins">
                0
            </span>
        </p>

        <p>
            🎮 Games Played:
            <span id="profile-games">
                0
            </span>
        </p>

        <p>
            🏆 Wins:
            <span id="profile-wins">
                0
            </span>
        </p>

        <p>
            💀 Losses:
            <span id="profile-losses">
                0
            </span>
        </p>

        <p>
            ⚡ Blackjacks:
            <span id="profile-blackjacks">
                0
            </span>
        </p>

        <p>
            📈 Win Rate:
            <span id="profile-winrate">
                0%
            </span>
        </p>

        <p>
            🎨 Current Theme:
            <span id="profile-theme">
                None
            </span>
        </p>

        <br>

        <a href="index.html">

            <button>

                Return To Casino

            </button>

        </a>

    </div>

</main>

<script src="js/profile.js"></script>


</body>

</html>
