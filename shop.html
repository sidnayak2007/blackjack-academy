<!DOCTYPE html>

<html lang="en">

<head>


<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>
    Blackjack Academy Shop
</title>

<link rel="stylesheet"
      href="css/style.css">


</head>

<body>


<header class="top-bar">

    <div class="logo">

        🛒 BLACKJACK SHOP

    </div>

    <div class="coin-box">

        🪙 Purush Coins:
        <span id="coin-balance">
            0
        </span>

    </div>

</header>

<main class="shop-container">

    <h1>
        Theme Shop
    </h1>

    <div class="shop-grid">

        <div class="shop-card">

            <h2>🥇 Gold Theme</h2>

            <p>
                Cost: 2500 PC
            </p>

            <button
                id="gold-theme">

                Buy

            </button>

        </div>

        <div class="shop-card">

            <h2>💎 Diamond Theme</h2>

            <p>
                Cost: 2500 PC
            </p>

            <button
                id="diamond-theme">

                Buy

            </button>

        </div>

        <div class="shop-card">

            <h2>🔥 Neon Theme</h2>

            <p>
                Cost: 2500 PC
            </p>

            <button
                id="neon-theme">

                Buy

            </button>

        </div>

        <div class="shop-card">

            <h2>❤️ RCB Theme</h2>

            <p>
                Cost: 2500 PC
            </p>

            <button
                id="rcb-theme">

                Buy

            </button>

        </div>

        <div class="shop-card">

            <h2>👑 Royal Theme</h2>

            <p>
                Cost: 2500 PC
            </p>

            <button
                id="royal-theme">

                Buy

            </button>

        </div>

<button id="unequip-theme-btn">

    Unequip Current Theme

</button>

    </div>

    <br>

    <a href="index.html">

        <button>

            Return To Casino

        </button>

    </a>

</main>

<script src="js/shop.js"></script>


</body>

</html>
